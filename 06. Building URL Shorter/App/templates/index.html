<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My URL shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-300 text-gray-800 font-sans p-6">
    <div class="max-w-md mx-auto">
      <h1 class="text-3xl font-bold mb-6 text-blue-500">
        Welcome to My URL shortener
      </h1>
      <form method="POST" class="bg-white shadow-md rounded p-6 mb-6 space-y-4">
        <label class="block">
          <span class="text-gray-700">Enter your URL: </span>
          <input
            type="text"
            name="url"
            placeholder="https://example.com"
            required
            class="mt-1 block w-full border border-gray-300 rounded p-2"
          />
        </label>
        <button
          type="submit"
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
        >
          Shorten URL
        </button>
      </form>
      <h2 class="text-xl font-semibold mb-2">All Shortened URLs:</h2>
      {% if all_urls %}
      <div class="overflow-x-auto">
        <table class="w-full border border-collapse border-gray-300">
          
            {% endfor %}
          </tbody>

        </table>
      </div>
      {% else %}
        <p class="text-gray-600">No URLs have been shortened yet.</p>
      {% endif %}
    </div>   
  </body>
</html>
